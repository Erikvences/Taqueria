<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${Categoria.uuid} != null ? 'Editar Categoría' : 'Nueva Categoría'">Categoría</title>
    <div th:replace="~{fragmentos :: bootstrap}"></div>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div th:replace="~{fragmentos :: menu}"></div>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white py-3">
                        <h3 class="card-title h5 mb-0" th:text="${Categoria.uuid == null} ? 'Registrar Categoría' : 'Editar Categoría'"></h3>
                    </div>
                    <div class="card-body p-4">

                        <form th:action="${Categoria.uuid} == null ? @{/Categoria/guardar} : @{/Categoria/actualizar}" th:object="${Categoria}" method="post">

                            <input type="hidden" th:field="*{uuid}" />

                            <div class="mb-3">
                                <label for="nombre" class="form-label fw-bold">Nombre</label>
                                <input type="text" id="nombre" th:field="*{nombreCategoria}" class="form-control" th:classappend="${#fields.hasErrors('nombreCategoria')} ? 'is-invalid' : ''" placeholder="Ej. Bebidas, Abarrotes" />
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('nombreCategoria')}" th:errors="*{nombreCategoria}">Error en el nombre</div>
                            </div>

                            <div class="mb-4">
                                <label for="descripcion" class="form-label fw-bold">Descripción</label>
                                <textarea id="descripcion" th:field="*{descripcion}" class="form-control" th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid' : ''" rows="3" placeholder="Opcional: breve descripción"></textarea>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}">Error en la descripción</div>
                            </div>

                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/Categoria/listar}" class="btn btn-outline-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-save me-1"></i> Guardar
                                </button>
                            </div>

                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
