<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Categorías</title>
    <div th:replace="~{fragmentos :: bootstrap}"></div>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div th:replace="~{fragmentos :: menu}"></div>

    <div class="container mt-4">
        <div th:if="${mensaje} or ${param.error}" th:with="msg=${mensaje} ?: ${param.error}">
            <div th:class="${param.error} != null ? 'alert alert-danger alert-dismissible fade show' : 'alert alert-info alert-dismissible fade show'" role="alert">
                <span th:text="${msg}">Mensaje informativo</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h2 text-dark font-weight-bold">Catálogo de Categorías</h1>
                <p class="text-muted">Listado y administración de categorías de productos</p>
            </div>
            <a th:href="@{/Categoria/Nueva}" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i> Nueva Categoría
            </a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0" th:if="${not #lists.isEmpty(Categorias)}">
                        <thead class="table-dark">
                            <tr>
                                <th class="px-4">Nombre</th>
                                <th>Descripción</th>
                                <th class="text-end px-4">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="categoria : ${Categorias}">
                                <td class="px-4 fw-medium" th:text="${categoria.nombreCategoria}">Carne Roja</td>
                                <td th:text="${categoria.descripcion}">Descripción de la categoría</td>
                                <td class="text-end px-4">
                                    <a th:href="@{'/Categoria/editar/' + ${categoria.uuid}}" class="btn btn-sm btn-outline-primary me-1">
                                        <i class="bi bi-pencil-square"></i> Editar
                                    </a>
                                    <a th:href="@{'/Categoria/eliminar/' + ${categoria.uuid}}" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Estás seguro de que deseas eliminar esta categoría?');">
                                        <i class="bi bi-trash"></i> Eliminar
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <div th:if="${#lists.isEmpty(Categorias)}" class="text-center py-5">
                        <i class="bi bi-tags text-muted" style="font-size: 3rem;"></i>
                        <h3 class="h5 mt-3 text-dark">No hay categorías registradas</h3>
                        <p class="text-muted">Agrega una nueva categoría usando el botón de arriba.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
