<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Formulario Detalle Pedido</title>

	<div th:replace="~{fragmentos :: bootstrap}"></div>
</head>

<body>

<div th:replace="~{fragmentos :: menu}"></div>

<div class="container mt-4">

	<div class="card">

		<div class="card-header bg-dark text-white">
			<h4 th:text="${detallePedido.uuid == null} ? 'Agregar producto al pedido' : 'Editar producto del pedido'"></h4>
		</div>

		<div class="card-body">

			<form th:object="${detallePedido}"
				  th:action="${detallePedido.uuid == null} ? @{/rutaDetallePedidos/guardar} : @{/rutaDetallePedidos/actualizar}"
				  method="post">

				<input type="hidden" name="fromNew" th:value="${fromNew}" />

				<input type="hidden" th:field="*{uuid}">
				<input type="hidden" th:field="*{pedido.id}">
				<input type="hidden" th:field="*{pedido.uuid}">

				<div class="mb-3">
					<label class="form-label">Cliente</label>
					<input type="text"
						   class="form-control"
						   th:value="${pedido.cliente.nombre}"
						   readonly>
				</div>

				<div class="mb-3">
				<label for="producto" class="form-label fw-bold">Producto</label>

				<select id="producto" class="form-select"
					th:field="*{productoId}"
					th:classappend="${#fields.hasErrors('productoId')} ? 'is-invalid' : ''">
					<option value="">Seleccione un producto</option>

					<option th:each="producto : ${productos}"
						th:value="${producto.id}"
					th:text="${producto.nombreProducto + ' - ' + (producto.tipoCarne != null ? producto.tipoCarne.nombre : 'Sin tipo')}">
					</option>
				</select>
				<div class="invalid-feedback"
					th:if="${#fields.hasErrors('productoId')}"
					th:errors="*{productoId}">
				</div>
			</div>

			<div class="mb-3">
				<label for="cantidad" class="form-label fw-bold">Cantidad</label>

				<input id="cantidad" type="number"
					class="form-control"
					th:field="*{cantidad}"
					th:classappend="${#fields.hasErrors('cantidad')} ? 'is-invalid' : ''"
					min="1">
				<div class="invalid-feedback"
					th:if="${#fields.hasErrors('cantidad')}"
					th:errors="*{cantidad}">
				</div>
			</div>

			<div class="mb-3">
				<label for="topping" class="form-label fw-bold">Topping</label>

				<input id="topping" type="text"
						   th:field="*{topping}"
						   placeholder="Ejemplo: queso, salsa, cebolla...">
				</div>

				<div class="d-flex gap-2">

					<button type="submit" class="btn btn-success">
						Guardar
					</button>

					<a class="btn btn-secondary"
					   th:if="${fromNew}"
						th:onclick="|if(confirm('Si cancela, el pedido será eliminado. ¿Desea continuar?')) location.href='@{/rutaPedidos/eliminar/{uuid}(uuid=${pedido.uuid})}'; else return false;|">
						Cancelar
					</a>

					<a class="btn btn-secondary"
					   th:unless="${fromNew}"
					   th:href="@{'/rutaDetallePedidos/pedido/' + ${pedido.uuid}}">
						Cancelar
					</a>

				</div>

			</form>

		</div>

	</div>

</div>

</body>

</html>
