<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${cliente.uuid == null} ? 'Nuevo Cliente' : 'Editar Cliente'"></title>
	<!-- Fragmento Bootstrap -->
	<div th:replace="~{fragmentos :: bootstrap}"></div>
	<!-- Bootstrap Icons -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

	<!-- Navbar Global desde Fragmento -->
	<div th:replace="~{fragmentos :: menu}"></div>

	<div class="container mt-4">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-sm border-0">
					<div class="card-header bg-primary text-white py-3">
						<h3 class="card-title h5 mb-0" th:text="${cliente.uuid == null} ? 'Registrar Cliente' : 'Editar Cliente'"></h3>
					</div>
					<div class="card-body p-4">
						
						<!-- Form Action -->
						<form th:action="${cliente.uuid == null} ? @{/rutaClientes/guardar} : @{/rutaClientes/actualizar}" th:object="${cliente}" method="post">
							
							<!-- Hidden UUID -->
							<input type="hidden" th:field="*{uuid}" />

							<!-- Nombre -->
							<div class="mb-3">
								<label for="nombre" class="form-label fw-bold">Nombre Completo</label>
								<input type="text" id="nombre" th:field="*{nombre}" class="form-control" th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid' : ''" placeholder="Ej. Juan Pérez" />
								<div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}">
									Error en el nombre
								</div>
							</div>

							<!-- Teléfono -->
							<div class="mb-3">
								<label for="telefono" class="form-label fw-bold">Teléfono</label>
								<input type="text" id="telefono" th:field="*{telefono}" class="form-control" th:classappend="${#fields.hasErrors('telefono')} ? 'is-invalid' : ''" placeholder="Ej. 555-1234" />
								<div class="invalid-feedback" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}">
									Error en el teléfono
								</div>
							</div>

							<!-- Dirección -->
							<div class="mb-4">
								<label for="direccion" class="form-label fw-bold">Dirección</label>
								<input type="text" id="direccion" th:field="*{direccion}" class="form-control" th:classappend="${#fields.hasErrors('direccion')} ? 'is-invalid' : ''" placeholder="Ej. Av. Central #123" />
								<div class="invalid-feedback" th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}">
									Error en la dirección
								</div>
							</div>

							<!-- Actions -->
							<div class="d-flex justify-content-end gap-2">
								<a th:href="@{/rutaClientes/listar}" class="btn btn-outline-secondary">Cancelar</a>
								<button type="submit" class="btn btn-primary">
									<i class="bi bi-save me-1"></i> Guardar
								</button>
							</div>

						</form>

					</div>
				</div>
			</div>
		</div>
	</div>

</body>
</html>
