<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${Producto.uuid == null} ? 'Nuevo Producto' : 'Editar Producto'"></title>
	<!-- Fragmento Bootstrap -->
	<div th:replace="~{fragmentos :: bootstrap}"></div>
	<!-- Bootstrap Icons -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

	<!-- Navbar Global desde Fragmento -->
	<div th:replace="~{fragmentos :: menu}"></div>

	<div class="container mt-4">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-sm border-0">
					<div class="card-header bg-primary text-white py-3">
						<h3 class="card-title h5 mb-0" th:text="${Producto.uuid == null} ? 'Registrar Producto' : 'Editar Producto'"></h3>
					</div>
					<div class="card-body p-4">
						
						<!-- Form Action -->
						<form th:action="${Producto.uuid == null} ? @{/Producto/guardar} : @{/Producto/actualizar}" th:object="${Producto}" method="post">
							
							<!-- Hidden UUID -->
							<input type="hidden" th:field="*{uuid}" />

							<!-- Nombre -->
							<div class="mb-3">
								<label for="nombre" class="form-label fw-bold">Nombre del Producto</label>
								<input type="text" id="nombre" th:field="*{nombreProducto}" class="form-control" th:classappend="${#fields.hasErrors('nombreProducto')} ? 'is-invalid' : ''" placeholder="Ej. Taco Grande, Burrito chico, Gringa Chica" />
								<div class="invalid-feedback" th:if="${#fields.hasErrors('nombreProducto')}" th:errors="*{nombreProducto}">
									Error en el nombre
								</div>
							</div>

							<!-- Precio -->
							<div class="mb-3">
								<label for="precio" class="form-label fw-bold">Precio</label>
								<input type="number" step="0.01" id="precio" th:field="*{precio}" class="form-control" th:classappend="${#fields.hasErrors('precio')} ? 'is-invalid' : ''" placeholder="Ej. 120.50" />
								<div class="invalid-feedback" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}">
									Error en el precio
								</div>
							</div>

							<!-- Descripción -->
							<div class="mb-3">
								<label for="descripcion" class="form-label fw-bold">Descripción</label>
								<textarea id="descripcion" th:field="*{descripcion}" class="form-control" th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid' : ''" rows="3" placeholder="Descripción del producto"></textarea>
								<div class="invalid-feedback" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}">
									Error en la descripción
								</div>
							</div>

										

							<!-- Categoría -->
							<div class="mb-3">
								<label for="categoria" class="form-label fw-bold">Categoría</label>
								<select id="categoria" th:field="*{categoria.uuid}" class="form-select" th:classappend="${#fields.hasErrors('categoria.uuid')} ? 'is-invalid' : ''">
									<option th:if="${Producto.categoria == null or Producto.categoria.uuid == null}" value="" disabled selected>Selecciona una categoría</option>
									<option th:each="categoria : ${categorias}" th:value="${categoria.uuid}" th:text="${categoria.nombreCategoria}"></option>
								</select>
								<div class="invalid-feedback" th:if="${#fields.hasErrors('categoria.uuid')}" th:errors="*{categoria.uuid}">
									Error en la categoría
								</div>
							</div>

							<!-- Tipo de Carne -->
							<div class="mb-3">
								<label for="tipoCarne" class="form-label fw-bold">Tipo de Carne</label>
								<select id="tipoCarne" th:field="*{tipoCarne.uuid}" class="form-select" th:classappend="${#fields.hasErrors('tipoCarne.uuid')} ? 'is-invalid' : ''">
									<option th:if="${Producto.tipoCarne == null or Producto.tipoCarne.uuid == null}" value="" disabled selected>Selecciona un tipo de carne</option>
									<option th:each="tipo : ${tiposCarne}" th:value="${tipo.uuid}" th:text="${tipo.nombre}"></option>
								</select>
								<div class="invalid-feedback" th:if="${#fields.hasErrors('tipoCarne.uuid')}" th:errors="*{tipoCarne.uuid}">
									Error en el tipo de carne
								</div>
							</div>
							<!-- Gustos del equipo -->
										<div class="mb-3">
											<label for="gustaErikVD" class="form-label fw-bold">ErikVD</label>
											<input type="text" id="gustaErikVD" th:field="*{gustaErikVD}" class="form-control" th:classappend="${#fields.hasErrors('gustaErikVD')} ? 'is-invalid' : ''" />
											<div class="invalid-feedback" th:if="${#fields.hasErrors('gustaErikVD')}" th:errors="*{gustaErikVD}">Error</div>
										</div>

										<div class="mb-3">
											<label for="gustaLuisAngelOS" class="form-label fw-bold">LuisAngelOS</label>
											<input type="text" id="gustaLuisAngelOS" th:field="*{gustaLuisAngelOS}" class="form-control" th:classappend="${#fields.hasErrors('gustaLuisAngelOS')} ? 'is-invalid' : ''" />
											<div class="invalid-feedback" th:if="${#fields.hasErrors('gustaLuisAngelOS')}" th:errors="*{gustaLuisAngelOS}">Error</div>
										</div>

										<div class="mb-3">
											<label for="gustaDaffneeAraniV" class="form-label fw-bold">DaffneeAraniV</label>
											<input type="text" id="gustaDaffneeAraniV" th:field="*{gustaDaffneeAraniV}" class="form-control" th:classappend="${#fields.hasErrors('gustaDaffneeAraniV')} ? 'is-invalid' : ''" />
											<div class="invalid-feedback" th:if="${#fields.hasErrors('gustaDaffneeAraniV')}" th:errors="*{gustaDaffneeAraniV}">Error</div>
										</div>

										<div class="mb-3">
											<label for="gustaFernandoDavidSM" class="form-label fw-bold">FernandoDavidSM</label>
											<input type="text" id="gustaFernandoDavidSM" th:field="*{gustaFernandoDavidSM}" class="form-control" th:classappend="${#fields.hasErrors('gustaFernandoDavidSM')} ? 'is-invalid' : ''" />
											<div class="invalid-feedback" th:if="${#fields.hasErrors('gustaFernandoDavidSM')}" th:errors="*{gustaFernandoDavidSM}">Error</div>
										</div>

							<!-- Actions -->
							<div class="d-flex justify-content-end gap-2">
								<a th:href="@{/Producto/listar}" class="btn btn-outline-secondary">Cancelar</a>
								<button type="submit" class="btn btn-primary">
									<i class="bi bi-save me-1"></i> Guardar
								</button>
							</div>

						</form>

					</div>
				</div>
			</div>
		</div>
	</div>

</body>
</html>
